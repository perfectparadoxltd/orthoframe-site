<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .og{width:1200px;height:630px;position:relative;overflow:hidden;
    background:#08201d;font-family:"Helvetica Neue",Arial,sans-serif}
  .glow{position:absolute;right:-120px;top:50%;transform:translateY(-50%);
    width:780px;height:780px;border-radius:50%;
    background:radial-gradient(circle, rgba(21,137,126,.60) 0%, rgba(21,137,126,.20) 38%, rgba(8,32,29,0) 70%)}
  .brand{position:absolute;left:64px;top:46px;font-size:22px;font-weight:600;letter-spacing:9px;color:#7fa39b}
  .title{position:absolute;left:60px;top:150px;line-height:.95}
  .title .l1{font-size:118px;font-weight:800;letter-spacing:-3px;color:#f0ede4;margin:0}
  .title .l2{font-size:118px;font-weight:800;letter-spacing:-3px;color:#46c8b0;margin:0}
  .sub{position:absolute;left:64px;top:432px;font-size:31px;font-weight:400;line-height:1.35;color:#bcd2cc;max-width:560px}
  .logo{position:absolute;right:88px;top:50%;transform:translateY(-50%);width:410px;height:410px;
    filter:drop-shadow(0 30px 60px rgba(0,0,0,.55))}
</style></head><body>
<div class="og">
  <div class="glow"></div>
  <div class="brand">PERFECT PARADOX</div>
  <div class="title"><p class="l1">ORTHO</p><p class="l2">FRAME</p></div>
  <div class="sub">Clinical orthodontic photos,<br>sorted on your Mac.</div>
  <img class="logo" src="icon.png" alt="OrthoFrame">
</div></body></html>
